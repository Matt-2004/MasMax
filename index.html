<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/M.png" />
    <!-- Preconnect to TMDB image CDN so image requests start immediately -->
    <link rel="preconnect" href="https://image.tmdb.org" crossorigin />
    <link rel="dns-prefetch" href="https://image.tmdb.org" />
    <!-- Preconnect to TMDB API — crossorigin required for CORS Bearer-auth fetches -->
    <link rel="preconnect" href="https://api.themoviedb.org" crossorigin />
    <link rel="dns-prefetch" href="https://api.themoviedb.org" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Only the weights actually used: Titillium Web 400/600/700, Roboto 400/500/700 -->
    <!-- font-display=swap: text paints immediately with fallback font, no render-blocking -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Titillium+Web:wght@400;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Titillium+Web:wght@400;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MasMax</title>
    <!-- Preload hint for Vite entry JS so parser discovers it before render -->
    <link rel="modulepreload" href="/src/main.tsx" />
    <style>
      /* Skip-to-main link: visually hidden until focused */
      .skip-link {
        position: absolute;
        top: -100%;
        left: 1rem;
        z-index: 9999;
        padding: 0.5rem 1rem;
        background: #fff;
        color: #111115;
        font-weight: 700;
        font-size: 0.875rem;
        border-radius: 0 0 0.5rem 0.5rem;
        text-decoration: none;
        transition: top 0.15s;
      }
      .skip-link:focus {
        top: 0;
        outline: 2px solid #2eade7;
        outline-offset: 2px;
      }

      /* ── Critical CSS: paint background & font immediately ───────────── */
      html {
        padding: 0;
        margin: 0;
        height: 100%;
      }

      body {
        /* Inline the dark-theme bg so there's no flash of white before CSS bundle */
        background-color: #111115;
        color: #ffffff;
        font-family: "Titillium Web", ui-sans-serif, system-ui, sans-serif;
        user-select: none;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }

      /* Prevent layout shift before React mounts */
      #root {
        min-height: 100svh;
      }

      .no-scrollbar {
        overflow: hidden;
      }

      .no-scrollbar::-webkit-scrollbar {
        width: 0;
        /* Remove scrollbar space */
        background: transparent;
        /* Optional: transparent background */
      }
    </style>
  </head>

  <body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <div id="root"></div>
    <!-- Kick off the hero data fetch immediately — before React parses — so
         by the time HeroSection mounts the data (or most of it) is ready. -->
    <script>
      (function () {
        var BEARER = "%VITE_TMDB_API_KEY%";
        var CACHE_KEY = "__hero_cache";
        var CACHE_TTL = 5 * 60 * 1000; // 5 minutes

        // Try to serve stale data immediately from localStorage
        var stale = null;
        try {
          var raw = localStorage.getItem(CACHE_KEY);
          if (raw) {
            var parsed = JSON.parse(raw);
            if (Date.now() - parsed.ts < CACHE_TTL) {
              stale = parsed.data;
            }
          }
        } catch (e) {}

        // Network fetch — always fires to keep cache fresh
        var networkFetch = fetch(
          "https://api.themoviedb.org/3/trending/movie/day?language=en-US",
          {
            headers: { Authorization: "Bearer " + BEARER },
            priority: "high",
          },
        )
          .then(function (r) {
            return r.json();
          })
          .then(function (d) {
            var results = d.results || [];
            // Persist for next visit
            try {
              localStorage.setItem(
                CACHE_KEY,
                JSON.stringify({ ts: Date.now(), data: results }),
              );
            } catch (e) {}
            return results;
          })
          .catch(function () {
            return stale || [];
          });

        // If we have stale data resolve immediately; otherwise wait for network
        window.__heroPromise = stale ? Promise.resolve(stale) : networkFetch;

        // Always expose the live network result so cache gets updated
        window.__heroNetworkFetch = networkFetch;
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
